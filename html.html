<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attio Clone</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<script>

    /* ================= NAVBAR ================= */

    const navbar = document.createElement("header");
    navbar.className = "navbar";


    const navLeft = document.createElement("div");
    navLeft.className = "nav-left";


    const logo = document.createElement("h1");
    logo.className = "logo";
    logo.textContent = "attio";


    const navLinks = document.createElement("div");
    navLinks.className = "nav-links";


    const menuItems = [
        "Customers",
        "Changelog",
        "Help",
        "Careers",
        "Pricing"
    ];


    menuItems.forEach(item => {

        const link = document.createElement("a");

        link.href = "#";

        link.textContent = item;

        navLinks.appendChild(link);

    });


    navLeft.appendChild(logo);
    navLeft.appendChild(navLinks);



    const navRight = document.createElement("div");
    navRight.className = "nav-right";


    const signInBtn = document.createElement("button");
    signInBtn.className = "btn secondary";
    signInBtn.textContent = "Sign in";


    const startBtn = document.createElement("button");
    startBtn.className = "btn primary";
    startBtn.textContent = "Start for free";


    navRight.appendChild(signInBtn);
    navRight.appendChild(startBtn);


    navbar.appendChild(navLeft);
    navbar.appendChild(navRight);


    document.body.appendChild(navbar);



    /* ================= HERO ================= */

    const hero = document.createElement("section");
    hero.className = "hero";


    const badge = document.createElement("div");
    badge.className = "badge";

    badge.textContent =
    "Aug 4th — In SF? Join our in-person onboardings →";


    const heroTitle = document.createElement("h1");

    heroTitle.innerHTML =
    "Customer <br> relationship magic.";


    const heroText = document.createElement("p");

    heroText.textContent =
    "The first CRM designed for the way modern teams actually work. Powerful, flexible and data-driven.";


    const heroButtons = document.createElement("div");
    heroButtons.className = "hero-buttons";


    const heroBtn1 = document.createElement("button");
    heroBtn1.className = "btn primary";
    heroBtn1.textContent = "Start for free";


    const heroBtn2 = document.createElement("button");
    heroBtn2.className = "btn secondary";
    heroBtn2.textContent = "Talk to sales";


    heroButtons.appendChild(heroBtn1);
    heroButtons.appendChild(heroBtn2);


    hero.appendChild(badge);
    hero.appendChild(heroTitle);
    hero.appendChild(heroText);
    hero.appendChild(heroButtons);


    document.body.appendChild(hero);




    /* ================= TRUSTED BRANDS ================= */

    const brands = document.createElement("section");
    brands.className = "brands";


    const brandsTitle = document.createElement("p");
    brandsTitle.textContent =
    "TRUSTED BY INNOVATIVE TEAMS";


    const brandContainer =
    document.createElement("div");

    brandContainer.className =
    "brand-container";


    const brandNames = [
        "OpenAI",
        "Replicate",
        "ElevenLabs",
        "Cavern",
        "Pallet"
    ];


    brandNames.forEach(name => {

        const brand = document.createElement("h3");

        brand.textContent = name;

        brandContainer.appendChild(brand);

    });


    brands.appendChild(brandsTitle);
    brands.appendChild(brandContainer);


    document.body.appendChild(brands);




    /* ================= FEATURE SECTION ================= */

    const features = document.createElement("section");
    features.className = "features";



    function createCard(title,text){

        const card = document.createElement("div");
        card.className = "card";


        const heading = document.createElement("h2");
        heading.textContent = title;


        const paragraph = document.createElement("p");
        paragraph.textContent = text;


        card.appendChild(heading);
        card.appendChild(paragraph);


        return card;

    }



    const bigCard =
    document.createElement("div");

    bigCard.className =
    "big-card";


    const bigTitle =
    document.createElement("h2");

    bigTitle.textContent =
    "Build a CRM that fits your business.";


    const bigText =
    document.createElement("p");

    bigText.textContent =
    "Create workflows, automate processes and manage relationships effortlessly.";


    const mockup =
    document.createElement("div");

    mockup.className =
    "mockup";


    bigCard.appendChild(bigTitle);
    bigCard.appendChild(bigText);
    bigCard.appendChild(mockup);



    const card1 = createCard(
        "Smart Automation",
        "Automate repetitive tasks and workflows."
    );


    const card2 = createCard(
        "Real-time Sync",
        "Collaborate with your team instantly."
    );


    const card3 = createCard(
        "Flexible Views",
        "Organize data exactly how you want."
    );


    const card4 = createCard(
        "Powerful Analytics",
        "Track customer growth and performance."
    );



    features.appendChild(bigCard);

    features.appendChild(card1);
    features.appendChild(card2);
    features.appendChild(card3);
    features.appendChild(card4);


    document.body.appendChild(features);




    /* ================= CTA SECTION ================= */

    const cta =
    document.createElement("section");

    cta.className =
    "cta";


    const ctaTitle =
    document.createElement("h2");

    ctaTitle.textContent =
    "Ready to scale your relationships?";


    const ctaText =
    document.createElement("p");

    ctaText.textContent =
    "Join modern teams using Attio to grow faster.";


    const ctaBtn =
    document.createElement("button");

    ctaBtn.className =
    "btn primary";

    ctaBtn.textContent =
    "Get Started";


    cta.appendChild(ctaTitle);
    cta.appendChild(ctaText);
    cta.appendChild(ctaBtn);


    document.body.appendChild(cta);




    /* ================= FOOTER ================= */

    const footer =
    document.createElement("footer");

    footer.className =
    "footer";



    const footerLogo =
    document.createElement("h2");

    footerLogo.textContent =
    "attio";


    const footerText =
    document.createElement("p");

    footerText.textContent =
    "The future of CRM.";



    const footerLinks =
    document.createElement("div");

    footerLinks.className =
    "footer-links";


    const footerItems = [
        "Features",
        "Pricing",
        "Careers",
        "Privacy",
        "Blog"
    ];


    footerItems.forEach(item => {

        const link =
        document.createElement("a");

        link.href = "#";

        link.textContent = item;

        footerLinks.appendChild(link);

    });



    const copy =
    document.createElement("p");

    copy.className =
    "copyright";

    copy.textContent =
    "© 2026 Attio Ltd. All rights reserved.";



    footer.appendChild(footerLogo);
    footer.appendChild(footerText);
    footer.appendChild(footerLinks);
    footer.appendChild(copy);


    document.body.appendChild(footer);

</script>

</body>
</html>
